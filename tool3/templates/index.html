<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Date Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px 60px;
    }

    .logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 32px;
    }
    .logo svg { width: 64px; height: 64px; fill: #fff; margin-bottom: 10px; }
    .logo h1  { color: #fff; font-size: 1.7rem; font-weight: 700; letter-spacing: -.5px; }
    .logo p   { color: rgba(255,255,255,.75); font-size: .9rem; margin-top: 4px; }

    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      padding: 36px 32px; width: 100%; max-width: 600px;
    }

    .section-label {
      display: block; font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: #999; margin-bottom: 10px;
    }
    .search-row { display: flex; gap: 10px; }
    .search-row input {
      flex: 1; padding: 14px 16px; border: 2px solid #e0e0e0;
      border-radius: 12px; font-size: .95rem; outline: none;
      transition: border-color .2s; color: #222;
    }
    .search-row input:focus { border-color: #dc2743; }
    .search-row input::placeholder { color: #bbb; }

    .btn {
      padding: 14px 22px; border: none; border-radius: 12px;
      font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, #f09433, #dc2743, #bc1888);
      color: #fff; white-space: nowrap;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .6; cursor: default; }

    .divider { height: 1px; background: #f0f0f0; margin: 28px 0; }

    /* Result boxes */
    .result-box {
      border-radius: 14px; padding: 22px 20px;
      animation: fadeIn .3s ease;
    }
    .result-box.success { background: #f0fff4; border: 1.5px solid #68d391; }
    .result-box.warning { background: #fffdf0; border: 1.5px solid #f6c90e; }
    .result-box.error   { background: #fff5f5; border: 1.5px solid #fc8181; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    /* Exact match */
    .result-date { font-size: 1.5rem; font-weight: 700; color: #dc2743; margin-bottom: 6px; }
    .result-url a { color: #bc1888; font-size: .88rem; text-decoration: none; word-break: break-all; }
    .result-url a:hover { text-decoration: underline; }
    .result-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .meta-item { background: #fff; border-radius: 10px; padding: 10px 14px; border: 1px solid #e8e8e8; }
    .meta-item .label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #aaa; margin-bottom: 3px; }
    .meta-item .value { font-size: .92rem; font-weight: 600; color: #333; }

    /* Range result header */
    .range-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .range-badge {
      background: #f6c90e; color: #7a5f00; font-size: .7rem;
      font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
      padding: 3px 9px; border-radius: 20px;
    }
    .range-title { font-size: .95rem; font-weight: 600; color: #555; }
    .range-dates {
      background: #fff; border: 1.5px solid #f6c90e; border-radius: 14px;
      padding: 16px 20px; margin-bottom: 16px; text-align: center;
    }
    .range-label { font-size: 1.05rem; font-weight: 700; color: #333; line-height: 1.5; }
    .range-sub   { font-size: .8rem; color: #999; margin-top: 5px; }

    /* Neighbor rows */
    .nb-row {
      background: #fff; border-radius: 12px; border: 1.5px solid #e8e8e8;
      padding: 13px 16px; display: flex; align-items: center; gap: 14px;
    }
    .nb-row + .nb-row { margin-top: 8px; }
    .nb-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .nb-dot.older { background: #68d391; }
    .nb-dot.newer { background: #63b3ed; }
    .nb-info { flex: 1; min-width: 0; }
    .nb-label { font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
    .nb-label.older { color: #38a169; }
    .nb-label.newer { color: #3182ce; }
    .nb-date { font-size: .98rem; font-weight: 700; color: #222; }
    .nb-id   { font-size: .72rem; color: #aaa; font-family: monospace; margin-top: 2px; word-break: break-all; }
    .nb-link { flex-shrink: 0; }
    .nb-link a {
      font-size: .8rem; color: #bc1888; text-decoration: none;
      background: #fff0f7; border: 1px solid #f9a8d4;
      padding: 4px 10px; border-radius: 8px; white-space: nowrap;
    }
    .nb-link a:hover { background: #fce7f3; }

    /* Unknown badge between the two rows */
    .nb-unknown {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
    }
    .nb-unknown-line { flex: 1; height: 1px; background: #e8e8e8; }
    .nb-unknown-badge {
      background: #fef9c3; color: #854d0e; font-size: .78rem;
      font-weight: 700; padding: 5px 14px; border-radius: 20px;
      border: 1.5px solid #fde047; white-space: nowrap;
    }

    /* Link box — shown under every Instagram link */
    .link-box {
      background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 10px;
      padding: 9px 12px; margin-top: 8px; display: flex; align-items: center; gap: 8px;
    }
    .link-box .link-url {
      flex: 1; font-size: .78rem; color: #555; word-break: break-all;
      font-family: monospace; overflow: hidden; white-space: nowrap;
      text-overflow: ellipsis;
    }
    .link-box .btn-open {
      flex-shrink: 0; font-size: .75rem; font-weight: 700;
      color: #fff; background: #bc1888; border: none;
      padding: 5px 10px; border-radius: 7px; cursor: pointer;
      text-decoration: none; white-space: nowrap;
    }
    .link-box .btn-open:hover { opacity: .85; }
    .link-box .btn-copy {
      flex-shrink: 0; font-size: .75rem; font-weight: 700;
      color: #bc1888; background: #fff0f7; border: 1px solid #f9a8d4;
      padding: 5px 10px; border-radius: 7px; cursor: pointer; white-space: nowrap;
    }
    .link-box .btn-copy:hover  { background: #fce7f3; }
    .link-box .btn-copy.copied { color: #38a169; background: #f0fff4; border-color: #68d391; }

    /* Error */
    .error-msg  { color: #c53030; font-weight: 600; }
    .error-hint { color: #999; font-size: .85rem; margin-top: 6px; }

    /* Upload */
    #file-input { display: none; }   /* hidden — triggered by the label */
    .upload-label {
      display: block;
      border: 2px dashed #e0e0e0; border-radius: 12px; padding: 20px;
      text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
    }
    .upload-label:hover,
    .upload-label.drag-over { border-color: #dc2743; background: #fff5f7; }
    .upload-icon { font-size: 2rem; margin-bottom: 6px; }
    .upload-label p { color: #999; font-size: .88rem; }
    .upload-label strong { color: #555; }

    #db-status { margin-top: 14px; border-radius: 10px; padding: 12px 16px; font-size: .85rem; display: none; }
    #db-status.loaded { background: #ebf8ff; border: 1px solid #90cdf4; color: #2b6cb0; }

    /* History */
    #history-section { display: none; }
    .history-list { list-style: none; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      transition: background .15s; font-size: .88rem;
    }
    .history-item:hover { background: #f7f7f7; }
    .h-query { color: #444; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
    .h-tag   { font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
    .h-tag.exact { background: #c6f6d5; color: #276749; }
    .h-tag.range { background: #fef9c3; color: #854d0e; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result { display: none; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
    </svg>
    <h1>Instagram Date Finder</h1>
    <p>Exact match or estimated date range from your database</p>
  </div>

  <div class="card">

    <label class="section-label">Post link · Shortcode · Post ID</label>
    <div class="search-row">
      <input id="query" type="text" autocomplete="off" spellcheck="false"
        placeholder="https://www.instagram.com/p/… or 3818230543192566459_36116147692" />
      <button class="btn btn-primary" id="search-btn" onclick="doSearch()">Search</button>
    </div>

    <div id="result"></div>

    <!-- Upload and DB status hidden — kept in DOM for JS functionality -->
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv,.xls" style="display:none" />
    <div id="upload-status" style="display:none;"></div>
    <div id="db-status" style="display:none;"></div>
    <div id="upload-label" style="display:none;"></div>

    <div class="divider" id="history-divider" style="display:none"></div>
    <div id="history-section">
      <div class="section-label">Recent searches</div>
      <ul class="history-list" id="history-list"></ul>
    </div>

  </div>

  <script>
    const history = [];

    window.addEventListener("DOMContentLoaded", () => {
      fetchStats();
      document.getElementById("query").addEventListener("keydown", e => {
        if (e.key === "Enter") doSearch();
      });
    });

    async function fetchStats() {
      try {
        const r = await fetch("/api/stats");
        const d = await r.json();
        if (d.filename) showDbStatus(d);
      } catch (_) {}
    }

    function showDbStatus(info) {
      // DB status intentionally hidden from UI
    }

    async function doSearch() {
      const query = document.getElementById("query").value.trim();
      if (!query) return;
      const btn = document.getElementById("search-btn");
      btn.innerHTML = 'Searching <span class="spinner"></span>';
      btn.disabled = true;

      try {
        const r = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });
        renderResult(await r.json(), query);
      } catch (e) {
        renderResult({ ok: false, error: "Network error: " + e.message }, query);
      } finally {
        btn.innerHTML = "Search";
        btn.disabled = false;
      }
    }

    function renderResult(resp, query) {
      const el = document.getElementById("result");
      el.style.display = "block";
      if (!resp.ok) {
        const hint = resp.hint || "Check that the link, shortcode, or Post ID is correct.";
        el.innerHTML = `
          <div class="result-box error">
            <div class="error-msg">❌ ${esc(resp.error)}</div>
            <div class="error-hint">${esc(hint)}</div>
          </div>`;
        addHistory(query, "—", "error");
        return;
      }
      if (resp.match === "exact") renderExact(el, resp.data, query);
      else renderRange(el, resp.data, query);
    }

    // ── Link box: open button + copy button + visible URL ────────────────────
    function linkBox(url, label) {
      if (!url) return "";
      const id = "lb_" + Math.random().toString(36).slice(2);
      return `
        <div class="link-box">
          <span class="link-url" title="${esc(url)}">${esc(url)}</span>
          <a class="btn-open" href="${esc(url)}" target="_blank" rel="noopener">${esc(label || "Open ↗")}</a>
          <button class="btn-copy" id="${id}" onclick="copyUrl('${esc(url)}','${id}')">Copy</button>
        </div>`;
    }

    function copyUrl(url, btnId) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        const ta = document.createElement("textarea");
        ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta);
        const btn = document.getElementById(btnId);
        if (btn) { btn.textContent = "Copied!"; btn.classList.add("copied"); setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000); }
      });
    }

    // ── Exact match ───────────────────────────────────────────────────────────
    function renderExact(el, d, query) {
      const date = d["_date_formatted"] || d["Published At"] || "—";

      el.innerHTML = `
        <div class="result-box success">
          <div style="margin-bottom:10px">
            <span style="background:#c6f6d5;color:#276749;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px">✓ Exact match</span>
          </div>
          <div style="font-size:.8rem;color:#888;margin-bottom:4px">ID: ${esc(query)}</div>
          <div class="result-date">📅 ${esc(date)}</div>
        </div>`;
      addHistory(query, date, "exact");
    }

    // ── Range match ───────────────────────────────────────────────────────────
    function renderRange(el, d, query) {
      // Show the post URL when we have a shortcode (covers URL-input searches)
      const postUrl = d.generated_url || "";
      const urlLine = postUrl
        ? `<div style="margin-top:6px">${linkBox(postUrl, "Open ↗")}</div>`
        : `<div style="font-size:.8rem;color:#888;margin-bottom:6px;margin-top:4px">ID: ${esc(String(d.numeric_id))}</div>`;

      el.innerHTML = `
        <div class="result-box warning">
          <div class="range-header">
            <span class="range-badge">⚡ Estimated range</span>
          </div>
          ${urlLine}
          <div class="range-dates" style="margin-top:10px">
            <div class="range-label">📅 ${esc(d.range_label)}</div>
          </div>
        </div>`;

      addHistory(query, d.range_label, "range");
    }

    // ── History ───────────────────────────────────────────────────────────────
    function addHistory(query, date, type) {
      history.unshift({ query, date, type });
      if (history.length > 8) history.pop();
      renderHistory();
    }

    function renderHistory() {
      document.getElementById("history-section").style.display = "block";
      document.getElementById("history-divider").style.display = "block";
      document.getElementById("history-list").innerHTML = history.map((h, i) => `
        <li class="history-item" onclick="reuse(${i})">
          <span class="h-query">${esc(h.query)}</span>
          <span class="h-tag ${h.type === 'exact' ? 'exact' : h.type === 'range' ? 'range' : ''}">${h.type === 'exact' ? 'Exact' : h.type === 'range' ? 'Range' : '—'}</span>
        </li>`).join("");
    }

    function reuse(i) {
      document.getElementById("query").value = history[i].query;
      doSearch();
    }

    // ── Upload ────────────────────────────────────────────────────────────────
    // Wire the hidden input's change event
    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("file-input");
      if (input) input.addEventListener("change", () => uploadFile(input.files[0]));

      // Drag-and-drop on the label
      const label = document.getElementById("upload-label");
      if (label) {
        label.addEventListener("dragover",  e => { e.preventDefault(); label.classList.add("drag-over"); });
        label.addEventListener("dragleave", e => { label.classList.remove("drag-over"); });
        label.addEventListener("drop", e => {
          e.preventDefault();
          label.classList.remove("drag-over");
          const file = e.dataTransfer.files[0];
          if (file) uploadFile(file);
        });
      }
    });

    function setUploadStatus(icon, text, color) {
      const el = document.getElementById("upload-status");
      el.style.display = "block";
      el.style.background = color === "green" ? "#f0fff4" : color === "red" ? "#fff5f5" : "#fffdf0";
      el.style.border     = `1px solid ${color === "green" ? "#68d391" : color === "red" ? "#fc8181" : "#f6c90e"}`;
      el.style.color      = color === "green" ? "#276749" : color === "red" ? "#c53030" : "#7a5f00";
      el.innerHTML = `${icon} ${esc(text)}`;
    }

    async function uploadFile(file) {
      if (!file) return;

      const allowed = [".xlsx", ".xls", ".csv"];
      const ext = file.name.slice(file.name.lastIndexOf(".")).toLowerCase();
      if (!allowed.includes(ext)) {
        setUploadStatus("❌", `Unsupported format: ${ext}. Use .xlsx, .xls or .csv`, "red");
        return;
      }

      setUploadStatus("⏳", `Uploading ${file.name}…`, "yellow");

      const form = new FormData();
      form.append("file", file);

      try {
        const r = await fetch("/api/upload", { method: "POST", body: form });

        // Parse response — server might return HTML on crash, handle gracefully
        let d;
        try {
          d = await r.json();
        } catch {
          setUploadStatus("❌", `Server error (HTTP ${r.status}) — see the terminal window for details.`, "red");
          return;
        }

        if (d.ok) {
          showDbStatus(d.info);
          setUploadStatus("✅", `${esc(file.name)} loaded — ${d.info.rows} posts indexed.`, "green");
        } else {
          setUploadStatus("❌", d.error || "Upload failed.", "red");
        }
      } catch (e) {
        // Only reaches here on true network error (server unreachable)
        setUploadStatus("❌", "Cannot reach the server. Make sure START.bat is running and the terminal is open.", "red");
      }

      // Reset the file input so the same file can be re-selected if needed
      const input = document.getElementById("file-input");
      if (input) input.value = "";
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
